# Production — Nginx devant PHP-FPM.
# TLS : terminé en amont (ex. Coolify, CDN) ; ce conteneur écoute en HTTP sur le port 80.
# Logs : volume Docker `nginx_logs` monté sur /var/log/nginx

map $http_x_forwarded_proto $fcgi_https {
    default "";
    https "on";
}

server {
    listen 80 default_server;
    server_name _;
    root /app/public;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # En-têtes de sécurité (HSTS, nosniff, Referrer-Policy, Permissions-Policy)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss image/svg+xml;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $php_upstream publicgraph-php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $fcgi_https if_not_empty;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}

