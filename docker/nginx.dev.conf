# Développement local — Nginx devant PHP-FPM (Symfony, FastCGI).
# TLS : non (Coolify / prod gèrent le HTTPS en amont si besoin).

server {
    listen 80;
    server_name localhost;
    root /app/public;

    # Résolution DNS au runtime (réseau Docker) pour éviter l’échec au démarrage si `app` n’est pas encore prêt
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    access_log /dev/stdout;
    error_log /dev/stderr info;
}
