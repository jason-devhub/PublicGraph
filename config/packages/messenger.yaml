framework:
    messenger:
        transports:
            # Redis streams (see MESSENGER_*_DSN in .env). Requires ext-redis in runtime (image publicgraph-php).
            async: '%env(MESSENGER_ASYNC_DSN)%'
            scheduler: '%env(MESSENGER_SCHEDULER_DSN)%'
            sync: 'sync://'

        routing:
            Symfony\Component\Console\Messenger\RunCommandMessage: sync
            App\Message\ProximityRecalculateForPersonMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                scheduler: 'in-memory://'
