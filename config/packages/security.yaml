security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ADMIN: [ROLE_MODERATOR, ROLE_USER]

    providers:
        app_user_provider:
            entity:
                class: App\Module\User\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
            logout:
                path: app_logout
                target: app_home
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: logout

    access_control:
        - { path: ^/admin, roles: ROLE_MODERATOR }
        - { path: '^/[a-z]{2}/moderation', roles: ROLE_MODERATOR }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
        firewalls:
            main:
                login_throttling:
                    max_attempts: 10000
                    interval: '1 minute'
