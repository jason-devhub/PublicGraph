# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    http_client:
        default_options:
            timeout: 10

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    # Commandes planifiées (Symfony Scheduler) + transport Messenger `scheduler` (Redis).
    scheduler:
        enabled: true

    # UUID v7 par défaut (entités en M2).
    uid:
        default_uuid_version: 7

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
