nelmio_security:
    # prevents framing of the entire site
    clickjacking:
        paths:
            '^/.*': DENY

    # disables content type sniffing for script resources
    content_type:
        nosniff: true

    # Send a full URL in the `Referer` header when performing a same-origin request,
    # only send the origin of the document to secure destination (HTTPS->HTTPS),
    # and send no header to a less secure destination (HTTPS->HTTP).
    # If `strict-origin-when-cross-origin` is not supported, use `no-referrer` policy,
    # no referrer information is sent along with requests.
    referrer_policy:
        enabled: true
        policies:
            - 'no-referrer'
            - 'strict-origin-when-cross-origin'

    permissions_policy:
        enabled: false

when@prod:
    nelmio_security:
        csp:
            enabled: true
            enforce:
                default-src: ["'self'"]
                # Doit différer de default-src : sinon Nelmio n’émet pas script-src et les
                # scripts inline de l’import map sont évalués contre default-src → tout le JS bloqué.
                # data: = modules générés par AssetMapper ; ga.jspm.io = polyfill import map.
                script-src: ["'self'", 'https://ga.jspm.io', 'data:']
                style-src: ["'self'", "'unsafe-inline'"]
                img-src: ["'self'", 'data:', 'https://commons.wikimedia.org', 'https://upload.wikimedia.org']
                font-src: ["'self'"]
                connect-src: ["'self'"]
                object-src: ["'none'"]
                base-uri: ["'self'"]
                form-action: ["'self'"]
                frame-ancestors: ["'none'"]
                block-all-mixed-content: true

when@dev:
    nelmio_security:
        csp:
            enabled: false

when@test:
    nelmio_security:
        csp:
            enabled: false
