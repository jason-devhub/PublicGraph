
services:
  publicgraph-web:
    # Dev : aligné sur .env.local — le compose principal force prod (Coolify).
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    # Dev : code source monté pour les modifications en temps réel.
    # nginx.dev.conf remplace la config embarquée dans l'image prod.
    volumes:
      - .:/app
      - app_vendor:/app/vendor
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-8080}:80"

  publicgraph-worker:
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    volumes:
      - .:/app
      - app_vendor:/app/vendor

  publicgraph-search:
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
    ports:
      - "${MEILISEARCH_HTTP_PORT:-7700}:7700"

###> doctrine/doctrine-bundle ###
  # MariaDB est fourni hors compose (Coolify ou service managé), via DATABASE_URL.
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: ${MAILPIT_IMAGE}
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

volumes:
  app_vendor:
