x-symfony-env: &symfony-env
  APP_ENV: ${APP_ENV:-prod}
  APP_DEBUG: ${APP_DEBUG:-0}
  APP_SECRET: ${APP_SECRET:?definir APP_SECRET}
  APP_SHARE_DIR: ${APP_SHARE_DIR:-var/share}
  DATABASE_URL: ${DATABASE_URL:?definir DATABASE_URL}
  REDIS_URL: ${REDIS_URL:?definir REDIS_URL}
  MEILISEARCH_URL: ${MEILISEARCH_URL:-http://publicgraph-search:7700}
  MEILISEARCH_KEY: ${MEILISEARCH_KEY:?definir MEILISEARCH_KEY}
  MAILER_DSN: ${MAILER_DSN:-null://null}
  SENTRY_DSN: ${SENTRY_DSN:-}
  DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
  MESSENGER_ASYNC_DSN: ${MESSENGER_ASYNC_DSN:?definir MESSENGER_ASYNC_DSN}
  MESSENGER_SCHEDULER_DSN: ${MESSENGER_SCHEDULER_DSN:?definir MESSENGER_SCHEDULER_DSN}
  APP_DEFAULT_LOCALE: ${APP_DEFAULT_LOCALE:-en}
  APP_ENABLED_LOCALES: ${APP_ENABLED_LOCALES:-en,fr}
  STATUS_SHOW_TELEMETRY: ${STATUS_SHOW_TELEMETRY:-0}

# Déploiement type Coolify / reverse-proxy managé :
# — publicgraph-web : image unique Nginx+PHP-FPM, expose le port 80 (pas de ports: pour éviter les
#   conflits sur l'hôte). Coolify route le domaine public vers ce conteneur via le réseau interne.
# — publicgraph-worker : même image, commande overridée pour le messenger (sans Nginx).
# — publicgraph-search : Meilisearch officiel, accès interne uniquement.

services:

  publicgraph-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    expose:
      - "80"
    environment:
      <<: *symfony-env
    depends_on:
      publicgraph-search:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_var:/app/var

  publicgraph-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    command: ["php", "bin/console", "messenger:consume", "async", "scheduler", "-vv", "--time-limit=3600", "--memory-limit=200M"]
    environment:
      <<: *symfony-env
    depends_on:
      publicgraph-search:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_var:/app/var

  publicgraph-search:
    image: ${MEILISEARCH_IMAGE:-getmeili/meilisearch:v1.10}
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?definir MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  meili_data:
  app_var:
