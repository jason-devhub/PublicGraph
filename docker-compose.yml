# APP_ENV / APP_DEBUG en littéraux (comme example/docker-compose.yml) : évite « environment cannot be empty »
# quand Coolify ou l’hôte exporte APP_ENV= (chaîne vide) — Dotenv ne remplace pas une valeur vide par défaut.
x-symfony-env: &symfony-env
  APP_ENV: prod
  APP_DEBUG: "0"
  APP_SECRET: ${APP_SECRET:?definir APP_SECRET}
  APP_SHARE_DIR: ${APP_SHARE_DIR:-var/share}
  DATABASE_URL: ${DATABASE_URL:?definir DATABASE_URL}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  MEILISEARCH_URL: ${MEILISEARCH_URL:-http://publicgraph-search:7700}
  MEILISEARCH_KEY: ${MEILISEARCH_KEY:?definir MEILISEARCH_KEY}
  MAILER_DSN: ${MAILER_DSN:-null://null}
  SENTRY_DSN: ${SENTRY_DSN:-}
  DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
  # Files Redis distinctes (streams Symfony Messenger). Même hôte que REDIS_URL.
  MESSENGER_ASYNC_DSN: ${MESSENGER_ASYNC_DSN:-redis://redis:6379/messages}
  MESSENGER_SCHEDULER_DSN: ${MESSENGER_SCHEDULER_DSN:-redis://redis:6379/scheduler}
  APP_DEFAULT_LOCALE: ${APP_DEFAULT_LOCALE:-en}
  APP_ENABLED_LOCALES: ${APP_ENABLED_LOCALES:-en,fr}
  STATUS_SHOW_TELEMETRY: ${STATUS_SHOW_TELEMETRY:-0}

# Déploiement type Coolify / reverse-proxy managé :
# — publicgraph-web : image unique Nginx+PHP-FPM, expose le port 80 (pas de ports: pour éviter les
#   conflits sur l'hôte). Coolify route le domaine public vers ce conteneur via le réseau interne.
# — publicgraph-worker : même image, commande overridée pour le messenger (sans Nginx).
# — redis : Redis officiel, accès interne uniquement, persistant via volume.
# — publicgraph-search : Meilisearch officiel, accès interne uniquement.

services:

  publicgraph-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    expose:
      - "80"
    environment:
      <<: *symfony-env
    depends_on:
      redis:
        condition: service_healthy
      publicgraph-search:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    volumes:
      - app_var:/app/var

  publicgraph-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    command: ["php", "bin/console", "messenger:consume", "async", "scheduler", "-vv", "--time-limit=3600", "--memory-limit=200M"]
    environment:
      <<: *symfony-env
    depends_on:
      redis:
        condition: service_healthy
      publicgraph-search:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - app_var:/app/var

  publicgraph-search:
    image: ${MEILISEARCH_IMAGE:-getmeili/meilisearch:v1.10}
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?definir MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:7700/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  meili_data:
  redis_data:
  app_var:
