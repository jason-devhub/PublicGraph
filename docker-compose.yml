x-symfony-env: &symfony-env
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_SECRET: ${APP_SECRET}
  APP_SHARE_DIR: ${APP_SHARE_DIR}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  MEILISEARCH_URL: ${MEILISEARCH_URL}
  MEILISEARCH_KEY: ${MEILISEARCH_KEY}
  MAILER_DSN: ${MAILER_DSN}
  SENTRY_DSN: ${SENTRY_DSN:-}
  DEFAULT_URI: ${DEFAULT_URI}
  MESSENGER_ASYNC_DSN: ${MESSENGER_ASYNC_DSN}
  MESSENGER_SCHEDULER_DSN: ${MESSENGER_SCHEDULER_DSN}
  APP_DEFAULT_LOCALE: ${APP_DEFAULT_LOCALE}
  APP_ENABLED_LOCALES: ${APP_ENABLED_LOCALES}
  STATUS_SHOW_TELEMETRY: ${STATUS_SHOW_TELEMETRY:-0}

services:

  nginx:
    image: ${NGINX_IMAGE}
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "9000"
    env_file:
      - .env
    environment:
      <<: *symfony-env
    depends_on:
      meilisearch:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_var_log:/app/var/log

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "bin/console", "messenger:consume", "async", "scheduler", "-vv", "--time-limit=3600", "--memory-limit=200M"]
    env_file:
      - .env
    environment:
      <<: *symfony-env
    depends_on:
      meilisearch:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_var_log:/app/var/log

  meilisearch:
    image: ${MEILISEARCH_IMAGE}
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: ${MEILI_ENV}
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  meili_data:
  nginx_logs:
  app_var_log:
